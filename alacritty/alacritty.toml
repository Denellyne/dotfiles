[font]
size = 10
# builtin_box_drawing = true

[window]
opacity = 0.65
dynamic_title = true
blur = true
dynamic_padding = true

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[env]
WINIT_X11_SCALE_FACTOR = "1.0"
TERM = "tmux-256color"


[general]
import = [
    "~/.config/alacritty/themes/themes/catppuccin_mocha.toml"
]

[colors]
#transparent_background_colors = true
#primary.background = "0xffffff"
