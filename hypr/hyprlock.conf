general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor = 
    path = ~/.config/hypr/wp/wp.png
    blur_passes = 2
    blur_size = 2
    color = rgba(25, 20, 20, 0.4) 
}

input-field {
    monitor =
    size = 500, 40
    position = 0, -150
    halign = center
    valign = center
    dots_center = true
    fade_on_empty = true
    outline_thickness = 1
    
    outer_color = rgba(aea2e6aa)
    inner_color = rgba(30, 30, 46, 0.2)
    font_color = rgb(205, 214, 244)
    check_color = rgb(166, 227, 161)
    fail_color = rgb(243, 139, 168)
    
    placeholder_text = <i>Password...</i>
    shadow_passes = 3
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M %d/%m/%y")</b>"
    color = rgb(205, 214, 244)
    font_size = 60
    font_family = JetBrains Mono Nerd Font, Ubuntu, sans-serif
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

label {
    monitor =
    text = cmd[update:600000] ~/.config/hypr/scripts/weather.sh
    color = rgb(186, 194, 222)
    font_size = 13
    font_family = JetBrains Mono Nerd Font, Ubuntu, sans-serif
    position = 0, 20
    halign = center
    valign = center
    shadow_passes = 2
}
